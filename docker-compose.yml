version: "3.9"

services:

  mongodb:
    image: mongo:7

    container_name: mongodb

    restart: always

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: qwerty

  app:

    build: .

    ports:
      - "5051:5050"

    depends_on:
      - mongodb